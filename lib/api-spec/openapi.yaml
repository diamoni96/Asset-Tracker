openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Clip Marker & Video Indexer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: media
    description: Media file operations
  - name: storage
    description: File storage operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /media:
    get:
      operationId: listMedia
      tags: [media]
      summary: List all media files
      responses:
        "200":
          description: List of media files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaFile"
    post:
      operationId: createMedia
      tags: [media]
      summary: Create a media file record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaFileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"

  /media/{id}:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get a media file with its transcript segments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Media file with transcript segments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFileWithSegments"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Delete a media file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /media/{id}/transcribe:
    post:
      operationId: transcribeMedia
      tags: [media]
      summary: Trigger AI transcription for a media file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Transcription started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/search:
    post:
      operationId: searchTranscript
      tags: [media]
      summary: Search transcript segments by keyword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscriptSearchInput"
      responses:
        "200":
          description: Matching transcript segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranscriptSegment"

  /media/stats:
    get:
      operationId: getMediaStats
      tags: [media]
      summary: Get aggregated stats for dashboard
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaStats"

  /media/recent:
    get:
      operationId: listRecentMedia
      tags: [media]
      summary: List recently processed media files
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent media files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaFile"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for a media file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MediaFile:
      type: object
      required: [id, title, fileUrl, objectPath, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        fileUrl:
          type: string
        objectPath:
          type: string
        duration:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, processing, completed, failed]
        segmentCount:
          type: ["integer", "null"]
        createdAt:
          type: string

    MediaFileInput:
      type: object
      required: [title, fileUrl, objectPath]
      properties:
        title:
          type: string
          minLength: 1
        fileUrl:
          type: string
        objectPath:
          type: string
        duration:
          type: ["number", "null"]

    TranscriptSegment:
      type: object
      required: [id, mediaFileId, text, startTime, endTime]
      properties:
        id:
          type: integer
        mediaFileId:
          type: integer
        text:
          type: string
        startTime:
          type: number
        endTime:
          type: number

    MediaFileWithSegments:
      type: object
      required: [id, title, fileUrl, objectPath, status, createdAt, segments]
      properties:
        id:
          type: integer
        title:
          type: string
        fileUrl:
          type: string
        objectPath:
          type: string
        duration:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, processing, completed, failed]
        createdAt:
          type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptSegment"

    MediaStats:
      type: object
      required: [total, processing, completed, failed, totalSegments]
      properties:
        total:
          type: integer
        processing:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        totalSegments:
          type: integer

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
